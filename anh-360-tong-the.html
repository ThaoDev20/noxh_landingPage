<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dự án Noxh Việt Thắng - Ảnh 360 tổng thể dự án</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        #mobile-menu {
            transition:
                transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.5s;
        }

        .menu-item {
            transition: all 0.5s;
        }
    </style>
</head>

<body class="font-sans">
    <section class="relative h-[170px] md:h-[184px] bg-[#f5f5f5] overflow-hidden">
        <div
            class="absolute top-0 left-0 right-0 h-20 bg-gradient-to-b from-white/50 via-white/20 to-transparent pointer-events-none z-0">
        </div>

        <!-- Hàng trên -->
        <div class="relative z-10 flex items-start justify-between px-4 pt-4 md:px-7 md:pt-5">
            <!-- Nút tiến độ -->
            <div id="project-progress-container" class="shrink-0">
                <button
                    class="bg-[#bda66d] text-white px-4 md:px-8 h-10 md:h-14 text-[13px] md:text-[16px] font-medium hover:opacity-90 transition whitespace-nowrap">
                    Tiến độ dự án
                </button>
            </div>

            <!-- Logo -->
            <!-- <a href="index.html" class="absolute right-4 top-6 md:left-1/2 md:right-auto md:top-5 md:-translate-x-1/2">
                <img src="assets/logo-rice.png" alt="Logo" class="h-12 md:h-24 w-auto object-contain" />
            </a> -->
        </div>

        <!-- Breadcrumb -->
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 md:left-[312px] md:translate-x-0 px-4 w-full md:w-auto">
            <p class="text-base text-sm md:text-base font-bold leading-snug">
                <a href="index.html" class="hover:text-gray-200 transition">Home</a>
                <span class="mx-2">/</span>
                <span>Ảnh 360 tổng thể dự án</span>
            </p>
        </div>
    </section>

    <div id="menu-container"></div>

    <div id="scroll-top-btn"
        class="fixed bottom-20 right-10 z-50 text-white p-4 rounded-full hover:scale-105 cursor-pointer transition-all hidden">
    </div>

    <aside id="mobile-menu"
        class="fixed left-0 top-0 z-50 h-screen w-70 bg-[#bead79] text-white shadow-2xl -translate-x-full opacity-95 rounded-r-3xl">
        <div class="px-5 pt-7">
            <!-- <div class="mb-8 w-fit">
                <img src="assets/logo_white.png" alt="Logo White" class="h-14 w-auto object-contain" />
            </div> -->
        </div>

        <button id="close-menu-btn"
            class="hidden absolute -right-20 cursor-pointer top-10 flex h-12 w-12 items-center justify-center bg-[#c8b27a] text-white shadow-sm transition-all duration-300 hover:scale-105 hover:bg-[#d0bc87]">
            <span class="text-4xl leading-none">&times;</span>
        </button>

        <nav class="px-5 pb-8">
            <ul id="menu-list" class="space-y-1"></ul>
        </nav>
    </aside>

    <footer id="main-footer" class="text-[#444] pt-10 font-sans border-t border-gray-200 bg-[#f3f3f3]">
        <!-- <div data-id="s1740913594" class="s1740913594 sectag ifram-vr360"
            style="background-color: #ffffffff; padding: 3rem 0">
            <iframe src="https://vr360.ai.vn/vr360-rice-city-long-chau/" width="100%" height="1000"
                style="border: none"></iframe>
        </div> -->

        <div id="footer-container"></div>
    </footer>
    <script src="main.js" defer></script>
</body>

</html>
