        .matbang-canho {

        .matbang-canho .item-floor {

            align-items: center;

        .matbang-canho .item-floor img {

        .matbang-canho .sbar {

            border: 1px solid rgba(0, 0, 0, 0.1921568627);

        .matbang-canho #rooms {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .matbang-canho #rooms .room {

        .matbang-canho #rooms .room button {

            padding: 10px 5px;
            border: 1px solid rgba(0, 0, 0, 0.1921568627);
            background-color: #fff;
            cursor: pointer;
            font-size: 15px;
        }

        .matbang-canho #rooms .room button:hover {
            background-color: #f4f4f4;
        }

        @media (max-width: 768px) {

            }

            .matbang-canho #buildings-img .building-img,

            .matbang-canho .sbar {

    <script id="scriptLayout">
        function throttle(func, limit) {
            let inThrottle;
            return function () {
                const args = arguments;
                const context = this;
                if (!inThrottle) {
                    func.apply(context, args);
                    inThrottle = true;
                    setTimeout(() => (inThrottle = false), limit);
                }
            };
        }

        document.addEventListener("DOMContentLoaded", function () {
            const header = document.querySelector("header");
            if (!header) return;

            const handleScroll = throttle(() => {
                if (window.scrollY > 200) {
                    header.classList.add("small");
                } else {
                    header.classList.remove("small");
                }
            }, 100);

            // window.addEventListener('scroll', handleScroll);
        });
        $("document").ready(function () {
            function formatNumber(n) {
                return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            }
            $.ajax({
                url: "/api/reportNumberVisitors",
                type: "GET",
                success: function (data) {
                    $("#totalUsers").text(formatNumber(data.totalUsers));
                    $("#activeUsers").text(formatNumber(data.activeUsers));
                    if ($("#number_users").length > 0) {
                        $("#number_users").text(formatNumber(data.activeUsers));
                    }
                },
            });
        });

        if (typeof AppCode == "undefined") {
            const AppCode = {};

            AppCode.process = {
                slug: "",

                getSlug: function () {
                    var slug = window.location.pathname;
                    this.slug = slug.replace(/\//g, "");
                },
                getCode: function () {
                    return localStorage.getItem("code_validator");
                },
                checkNeedCode: function () {
                    let Root = this;
                    $.ajax({
                        headers: {
                            "X-CSRF-TOKEN": $('meta[name="csrf-token"]').attr("content"),
                        },
                        url: "/api/checkNeedValidator",
                        type: "POST",
                        data: {
                            slug: Root.slug,
                        },
                        success: function (data) {
                            if (data.need == 1) {
                                $("#mainContent").css("display", "none");
                                $("#comSubmitCodeValidator").css("display", "block");
                                Root.submitCode();
                            } else {
                                $("#comSubmitCodeValidator").css("display", "none");
                            }
                        },
                        error: function (xhr, status, error) {
                            console.error("Error loading content:", error);
                        },
                    });
                },
                submitCode: function () {
                    let Root = this;
                    $("#formSubmitCodeValidator").on("submit", function (e) {
                        e.preventDefault();
                        var code = $("#code").val();
                        console.log("formSubmitCodeValidator " + code);
                        localStorage.removeItem("code_validator");
                        localStorage.setItem("code_validator", code);
                        window.location.reload();
                    });
                },
                validatorCode: function (code) {
                    let Root = this;
                    $.ajax({
                        headers: {
                            "X-CSRF-TOKEN": $('meta[name="csrf-token"]').attr("content"),
                        },
                        url: "/api/validatorCode/",
                        type: "POST",
                        data: {
                            code: code,
                            slug: Root.slug,
                        },
                        success: function (data) {
                            if (data.status == 1) {
                                $("#mainContent").css("display", "block");
                                $("#comSubmitCodeValidator").css("display", "none");
                            } else {
                                $("#mainContent").css("display", "none");
                                $("#comSubmitCodeValidator").css("display", "block");
                            }
                        },
                        error: function (xhr, status, error) {
                            console.error("Error loading content:", error);
                        },
                    });
                },
                init: function () {
                    this.getSlug();
                    if (this.slug != "") {
                        code = this.getCode();
                        if (code != null) {
                            this.validatorCode(code);
                            this.submitCode();
                        } else {
                            this.checkNeedCode();
                            this.submitCode();
                        }
                    }
                },
            };
            AppCode.process.init();
        }
    </script>
    <script id="scriptArea">
        $(document).ready(function () {
            const target = document.querySelector(".matbang-canho");
            if (target) {
                target.scrollIntoView({
                    behavior: "smooth",
                });
            } else {
                console.error("Element with class .matbang-canho not found");
            }
            $(".building-name").on("click", function () {
                const building = $(this).data("building");
                $(".building-name").removeClass("active");
                $(this).addClass("active");
                $(".floor-name").css("display", "none");
                $(".floor-name").eq(building).css("display", "block");
                $(".room-wrap").css("display", "none");
                $(".room-wrap").eq(building).css("display", "block");

                $(".building-img").css("display", "none");
                $(".building-img").eq(building).css("display", "block");

                $(".item-img").css("display", "none");
                $(".room").val(-1);
            });

            $(".room").on("change", function () {
                var building = $(this).data("building");
                var room = $(this).val();

                building = parseInt(building);
                room = parseInt(room);
                if (room != -1) {
                    $(".building-img").css("display", "none");
                } else {
                    $(".building-img").eq(building).css("display", "block");
                }

                $(".item-img").css("display", "none");
                $(".floor" + building + ".room" + room).css("display", "flex");
            });
            $(".go-to-room").on("click", function () {
                var building = $(this).data("building");
                var room = $(this).data("room");

                building = parseInt(building);
                room = parseInt(room);
                if (room != -1) {
                    $(".building-img").css("display", "none");
                } else {
                    $(".building-img").eq(building).css("display", "block");
                }
                $(".item-img").css("display", "none");
                $(".floor" + building + ".room" + room).css("display", "flex");
            });
        });
    </script>
