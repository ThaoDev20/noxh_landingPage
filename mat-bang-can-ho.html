    <style id="cssArea">
        .matbang-canho {
            border-top: 50px solid #b8a77a;
        }

        .matbang-canho #buildings-img {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .matbang-canho #buildings-img .building-img,
        .matbang-canho #buildings-img .item-img {
            height: calc(100vh - 100px);
            justify-content: center;
            align-items: center;
        }

        .matbang-canho #buildings-img .building-img {
            display: none;
        }

        .matbang-canho #buildings-img .building-img.item0 {
            display: block;
        }

        .matbang-canho #buildings-img .item-img {
            display: none;
        }

        .matbang-canho #building {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 20px;
        }

        .matbang-canho #building li {
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .matbang-canho #building li .building-name {
            font-size: 40px;
            line-height: 1.2;
            margin-top: 10px;
            color: #b3b3b3;
        }

        .matbang-canho #building li .building-name.active {
            color: #000;
        }

        .matbang-canho #floor .floor-name {
            font-size: 25px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .matbang-canho .item-floor {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .matbang-canho .item-floor img {
            max-height: 100%;
            max-width: 100%;
        }

        .matbang-canho .sbar {
            box-shadow: 0px 0px 5px 0px rgba(0, 0, 0, 0.1921568627);
            width: 100%;
            padding: 80px 20px;
            font-size: 16px;
        }

        .matbang-canho .sbar .select-input .inner {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .matbang-canho .sbar .select-input .inner select {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid rgba(0, 0, 0, 0.1921568627);
        }

        .matbang-canho #rooms {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .matbang-canho #rooms .room {
            flex: 1 1 calc(33.33% - 10px);
        }

        .matbang-canho #rooms .room button {
            width: 100%;
            padding: 10px 5px;
            border: 1px solid rgba(0, 0, 0, 0.1921568627);
            background-color: #fff;
            cursor: pointer;
            font-size: 15px;
        }

        .matbang-canho #rooms .room button:hover {
            background-color: #f4f4f4;
        }

        @media (max-width: 768px) {
            .matbang-canho {
                height: auto;
            }

            .matbang-canho #buildings-img {
                height: auto;
            }

            .matbang-canho #buildings-img .building-img,
            .matbang-canho #buildings-img .item-img {
                width: 100%;
                height: auto;
            }

            .matbang-canho .sbar {
                padding: 20px 10px;
            }

            .matbang-canho #building li .building-name {
                font-size: 30px;
            }

            .matbang-canho #floor .floor-name {
                font-size: 20px;
            }
        }

        #breadcrumb {
            background-color: #fafafa;
        }

        #breadcrumb ol {
            padding: 8px 0;
            padding-top: 150px;
            margin: 0;
        }

        @media (max-width: 768px) {
            #breadcrumb ol {
                padding-top: 100px;
            }
        }
    </style>

    <script id="scriptLayout">
        function throttle(func, limit) {
            let inThrottle;
            return function () {
                const args = arguments;
                const context = this;
                if (!inThrottle) {
                    func.apply(context, args);
                    inThrottle = true;
                    setTimeout(() => (inThrottle = false), limit);
                }
            };
        }

        document.addEventListener("DOMContentLoaded", function () {
            const header = document.querySelector("header");
            if (!header) return;

            const handleScroll = throttle(() => {
                if (window.scrollY > 200) {
                    header.classList.add("small");
                } else {
                    header.classList.remove("small");
                }
            }, 100);

            // window.addEventListener('scroll', handleScroll);
        });
        $("document").ready(function () {
            function formatNumber(n) {
                return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            }
            $.ajax({
                url: "/api/reportNumberVisitors",
                type: "GET",
                success: function (data) {
                    $("#totalUsers").text(formatNumber(data.totalUsers));
                    $("#activeUsers").text(formatNumber(data.activeUsers));
                    if ($("#number_users").length > 0) {
                        $("#number_users").text(formatNumber(data.activeUsers));
                    }
                },
            });
        });

        if (typeof AppCode == "undefined") {
            const AppCode = {};

            AppCode.process = {
                slug: "",

                getSlug: function () {
                    var slug = window.location.pathname;
                    this.slug = slug.replace(/\//g, "");
                },
                getCode: function () {
                    return localStorage.getItem("code_validator");
                },
                checkNeedCode: function () {
                    let Root = this;
                    $.ajax({
                        headers: {
                            "X-CSRF-TOKEN": $('meta[name="csrf-token"]').attr("content"),
                        },
                        url: "/api/checkNeedValidator",
                        type: "POST",
                        data: {
                            slug: Root.slug,
                        },
                        success: function (data) {
                            if (data.need == 1) {
                                $("#mainContent").css("display", "none");
                                $("#comSubmitCodeValidator").css("display", "block");
                                Root.submitCode();
                            } else {
                                $("#comSubmitCodeValidator").css("display", "none");
                            }
                        },
                        error: function (xhr, status, error) {
                            console.error("Error loading content:", error);
                        },
                    });
                },
                submitCode: function () {
                    let Root = this;
                    $("#formSubmitCodeValidator").on("submit", function (e) {
                        e.preventDefault();
                        var code = $("#code").val();
                        console.log("formSubmitCodeValidator " + code);
                        localStorage.removeItem("code_validator");
                        localStorage.setItem("code_validator", code);
                        window.location.reload();
                    });
                },
                validatorCode: function (code) {
                    let Root = this;
                    $.ajax({
                        headers: {
                            "X-CSRF-TOKEN": $('meta[name="csrf-token"]').attr("content"),
                        },
                        url: "/api/validatorCode/",
                        type: "POST",
                        data: {
                            code: code,
                            slug: Root.slug,
                        },
                        success: function (data) {
                            if (data.status == 1) {
                                $("#mainContent").css("display", "block");
                                $("#comSubmitCodeValidator").css("display", "none");
                            } else {
                                $("#mainContent").css("display", "none");
                                $("#comSubmitCodeValidator").css("display", "block");
                            }
                        },
                        error: function (xhr, status, error) {
                            console.error("Error loading content:", error);
                        },
                    });
                },
                init: function () {
                    this.getSlug();
                    if (this.slug != "") {
                        code = this.getCode();
                        if (code != null) {
                            this.validatorCode(code);
                            this.submitCode();
                        } else {
                            this.checkNeedCode();
                            this.submitCode();
                        }
                    }
                },
            };
            AppCode.process.init();
        }
    </script>
    <script id="scriptArea">
        $(document).ready(function () {
            const target = document.querySelector(".matbang-canho");
            if (target) {
                target.scrollIntoView({
                    behavior: "smooth",
                });
            } else {
                console.error("Element with class .matbang-canho not found");
            }
            $(".building-name").on("click", function () {
                const building = $(this).data("building");
                $(".building-name").removeClass("active");
                $(this).addClass("active");
                $(".floor-name").css("display", "none");
                $(".floor-name").eq(building).css("display", "block");
                $(".room-wrap").css("display", "none");
                $(".room-wrap").eq(building).css("display", "block");

                $(".building-img").css("display", "none");
                $(".building-img").eq(building).css("display", "block");

                $(".item-img").css("display", "none");
                $(".room").val(-1);
            });

            $(".room").on("change", function () {
                var building = $(this).data("building");
                var room = $(this).val();

                building = parseInt(building);
                room = parseInt(room);
                if (room != -1) {
                    $(".building-img").css("display", "none");
                } else {
                    $(".building-img").eq(building).css("display", "block");
                }

                $(".item-img").css("display", "none");
                $(".floor" + building + ".room" + room).css("display", "flex");
            });
            $(".go-to-room").on("click", function () {
                var building = $(this).data("building");
                var room = $(this).data("room");

                building = parseInt(building);
                room = parseInt(room);
                if (room != -1) {
                    $(".building-img").css("display", "none");
                } else {
                    $(".building-img").eq(building).css("display", "block");
                }
                $(".item-img").css("display", "none");
                $(".floor" + building + ".room" + room).css("display", "flex");
            });
        });
    </script>
