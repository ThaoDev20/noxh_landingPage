<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rice City Long Châu - Tiến độ dự án</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        #mobile-menu {
            transition:
                transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.5s;
        }

        .menu-item {
            transition: all 0.5s;
        }
    </style>
</head>

<body class="font-sans">
    <section class="relative h-[50vh] bg-cover bg-center overflow-hidden"
        style="background-image: url(&quot;assets/bgB.jpg.webp&quot;)">
        <div
            class="absolute top-0 left-0 right-0 h-28 bg-gradient-to-b from-white/50 via-white/20 to-transparent pointer-events-none z-0">
        </div>

        <a class="absolute top-4 right-4 z-10 md:left-1/2 md:right-auto md:-translate-x-1/2 cursor-pointer"
            href="home.html">
            <img src="assets/logo-rice.png" alt="Logo" class="h-16 w-auto object-contain md:h-25" />
        </a>

        <div class="relative z-10 cursor-pointer" id="project-progress-container">
        </div>

        <div class="absolute bottom-20 left-1/2 z-10 w-full -translate-x-1/2 px-6 text-center">
            <p class="text-white text-sm md:text-base font-bold leading-snug">
                Home / Tiến độ dự án NOXH
            </p>
            <p class="text-white text-xl md:text-3xl font-bold leading-snug mt-4 md:mt-6">
                Tiến độ dự án NOXH
            </p>
        </div>
    </section>

    <div id="menu-container"></div>

    <div id="scroll-top-btn"
        class="fixed bottom-20 right-10 z-50 text-white p-4 rounded-full hover:scale-105 cursor-pointer transition-all hidden">
    </div>

    <aside id="mobile-menu"
        class="fixed left-0 top-0 z-50 h-screen w-70 bg-[#bead79] text-white shadow-2xl -translate-x-full opacity-95 rounded-r-3xl">
        <div class="px-5 pt-7">
            <div class="mb-8 w-fit">
                <img src="assets/logo_white.png" alt="Logo White" class="h-14 w-auto object-contain" />
            </div>
        </div>

        <button id="close-menu-btn"
            class="hidden absolute -right-20 cursor-pointer top-10 flex h-12 w-12 items-center justify-center bg-[#c8b27a] text-white shadow-sm transition-all duration-300 hover:scale-105 hover:bg-[#d0bc87]">
            <span class="text-4xl leading-none">&times;</span>
        </button>

        <nav class="px-5 pb-8">
            <ul id="menu-list" class="space-y-1"></ul>
        </nav>
    </aside>

    <div class="bg-white py-16 px-4">

        <div class="max-w-7xl mx-auto">
            <div class="text-center mb-12">
                <h2 class="text-[#4a4a4a] text-2xl md:text-3xl font-bold mb-2">
                    Tiến độ xây dựng Nhà ở Xã Hội
                </h2>
                <div class="w-16 h-1 bg-[#8b734b] mx-auto"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                <a class="flex flex-col items-center" href="noxh-ct1.html">
                    <div class="w-full aspect-[16/9] overflow-hidden rounded-lg shadow-lg mb-6">
                        <img src="assets/ct1.jpg" alt="Tiến độ CT1 và hạ tầng"
                            class="w-full h-auto object-cover hover:scale-105 transition-transform duration-500 cursor-pointer">
                    </div>
                    <p class="text-[#333] font-bold text-lg uppercase tracking-wide">
                        CT1 và hạ tầng
                    </p>
                </a>

                <a class="flex flex-col items-center" href="noxh-ct2&ct-3.html">
                    <div class="w-full aspect-[16/9] overflow-hidden rounded-lg shadow-lg mb-6">
                        <img src="assets/ct2_ct3.jpg" alt="Tiến độ CT2+CT3 và hạ tầng"
                            class="w-full h-auto object-cover hover:scale-105 transition-transform duration-500 cursor-pointer">
                    </div>
                    <p class="text-[#333] font-bold text-lg uppercase tracking-wide">
                        CT2+CT3 và hạ tầng
                    </p>
                </a>

            </div>
        </div>

    </div>
    <script src="main.js" defer></script>
    <script src="noxh.js"></script>
</body>

</html>
